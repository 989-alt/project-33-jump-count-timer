<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#111111" />
  <title>점프 카운트 타이머 · Day 33</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <!-- 메인 화면 -->
  <div id="screen-main" class="screen" data-screen="main">
    <header class="utility-bar">
      <div class="brand">JUMP COUNT TIMER</div>
      <nav class="utility-actions" aria-label="유틸리티">
        <button id="btn-mute" class="util-btn" type="button" aria-pressed="false" aria-label="소리 음소거 토글">
          <svg class="ic-sound-on" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <path d="M3 10v4h4l5 4V6L7 10H3z" fill="currentColor"/>
            <path d="M16 8.5a4 4 0 0 1 0 7M18.5 6a7 7 0 0 1 0 12" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
          </svg>
          <svg class="ic-sound-off" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <path d="M3 10v4h4l5 4V6L7 10H3z" fill="currentColor"/>
            <path d="M16 9l6 6M22 9l-6 6" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
          </svg>
          <span class="util-label">소리</span>
        </button>
        <button id="btn-export" class="util-btn" type="button" aria-label="기록을 JSON 파일로 내보내기">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path d="M12 4v11M7 10l5 5 5-5M5 19h14" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span class="util-label">Export</span>
        </button>
        <button id="btn-import" class="util-btn" type="button" aria-label="JSON 파일에서 기록 불러오기">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path d="M12 20V9M7 14l5-5 5 5M5 5h14" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span class="util-label">Import</span>
        </button>
        <input id="file-import" type="file" accept="application/json,.json" hidden />
        <button id="btn-reset-all" class="util-btn util-danger" type="button" aria-label="모든 기록 초기화">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path d="M5 7h14M9 7V5h6v2M7 7l1 13h8l1-13" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span class="util-label">전체 초기화</span>
        </button>
      </nav>
    </header>

    <main class="content">
      <section class="row row-setup">
        <article class="card card-students" aria-labelledby="hd-students">
          <h2 id="hd-students" class="card-title">학생</h2>
          <p class="card-sub">측정할 학생을 선택하거나 추가하세요.</p>
          <ul id="student-list" class="student-list" role="listbox" aria-label="학생 목록"></ul>
          <form id="form-add-student" class="add-row">
            <label class="sr-only" for="input-new-student">새 학생 이름</label>
            <input id="input-new-student" class="text-input" type="text" placeholder="새 학생 이름" maxlength="20" autocomplete="off" />
            <button type="submit" class="btn btn-primary">추가</button>
          </form>
        </article>

        <article class="card card-preset" aria-labelledby="hd-preset">
          <h2 id="hd-preset" class="card-title">시간</h2>
          <p class="card-sub">측정 시간을 고르세요.</p>
          <div id="preset-row" class="preset-row" role="radiogroup" aria-label="시간 프리셋 (초)">
            <button type="button" class="chip" data-seconds="15" role="radio" aria-checked="false">15초</button>
            <button type="button" class="chip" data-seconds="30" role="radio" aria-checked="true">30초</button>
            <button type="button" class="chip" data-seconds="60" role="radio" aria-checked="false">60초</button>
            <button type="button" class="chip" data-seconds="180" role="radio" aria-checked="false">180초</button>
          </div>
          <div class="custom-row">
            <label for="input-custom">또는 임의 입력</label>
            <div class="custom-input-row">
              <input id="input-custom" class="text-input num-input" type="number" min="5" max="600" placeholder="5–600" inputmode="numeric" />
              <button id="btn-custom" type="button" class="btn btn-secondary">적용</button>
            </div>
          </div>
          <div class="hint">단축키: <kbd>Space</kbd> 카운트 · <kbd>S</kbd> 시작/정지 · <kbd>R</kbd> 초기화</div>
        </article>
      </section>

      <div class="start-row">
        <button id="btn-start" class="btn btn-primary btn-xl" type="button">START</button>
        <p id="start-hint" class="start-hint" aria-live="polite">학생을 선택하면 시작할 수 있어요.</p>
      </div>

      <section class="card card-rank" aria-labelledby="hd-rank">
        <h2 id="hd-rank" class="card-title">반 PR 랭킹</h2>
        <p class="card-sub">시간 프리셋별 Top 5 (개인 최고 기록 기준).</p>
        <div id="rank-tabs" class="rank-tabs" role="tablist" aria-label="시간 프리셋 탭">
          <button type="button" class="tab" role="tab" data-seconds="15" aria-selected="false">15초</button>
          <button type="button" class="tab tab-active" role="tab" data-seconds="30" aria-selected="true">30초</button>
          <button type="button" class="tab" role="tab" data-seconds="60" aria-selected="false">60초</button>
          <button type="button" class="tab" role="tab" data-seconds="180" aria-selected="false">180초</button>
        </div>
        <ol id="rank-list" class="rank-list" aria-live="polite"></ol>
      </section>
    </main>
  </div>

  <!-- 측정 화면 -->
  <div id="screen-run" class="screen hidden" data-screen="run" aria-hidden="true">
    <header class="run-bar">
      <button id="btn-cancel" class="btn btn-secondary" type="button" aria-label="측정 취소">← 취소</button>
      <div id="run-meta" class="run-meta"></div>
      <div></div>
    </header>
    <main class="run-stage" id="tap-zone" tabindex="0" role="button" aria-label="화면을 탭하거나 스페이스바를 눌러 카운트">
      <div id="prepare" class="prepare" hidden>
        <div class="prepare-label">준비</div>
        <div id="prepare-num" class="prepare-num" aria-live="assertive">3</div>
      </div>
      <div id="run-active" class="run-active" hidden>
        <div id="count-display" class="count-display" aria-live="polite" aria-atomic="true">0</div>
        <div class="run-foot">
          <div id="time-remaining" class="time-remaining">남은 시간 0초</div>
          <div class="tap-hint">화면을 탭하거나 <kbd>Space</kbd>를 누르세요</div>
        </div>
      </div>
    </main>
  </div>

  <!-- 결과 화면 -->
  <div id="screen-result" class="screen hidden" data-screen="result" aria-hidden="true">
    <main class="result-stage">
      <div id="result-meta" class="result-meta"></div>
      <div id="result-count" class="result-count">0 회</div>
      <div id="result-pr" class="result-pr" role="status" aria-live="assertive"></div>
      <div class="result-actions">
        <button id="btn-next" class="btn btn-secondary btn-lg" type="button">다음 학생</button>
        <button id="btn-again" class="btn btn-primary btn-lg" type="button">다시 측정</button>
      </div>
    </main>
  </div>

  <!-- 토스트 -->
  <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

  <script src="./app.js" defer></script>
</body>
</html>
